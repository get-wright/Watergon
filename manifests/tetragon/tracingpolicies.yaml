# Observe-only kernel hooks for DVWA benchmark detections. Tetragon adds
# process and Kubernetes metadata to process_kprobe events; the sock/file args
# below provide destination and path details for Wazuh correlation.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: tcp-connect-monitor
  namespace: vulnerable-apps
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: sensitive-file-open
  namespace: vulnerable-apps
spec:
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/passwd"
                - "/etc/shadow"
                - "/var/run/secrets/kubernetes.io/serviceaccount/token"
                - "/root/.ssh"
