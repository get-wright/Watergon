apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-tetragon-rules
  namespace: wazuh
data:
  0700-tetragon_rules.xml: |
    <group name="tetragon,">

      <!-- Base rules: level 0 = match-only (for if_sid chaining), NO alerts.
           Specific child rules below fire at their own non-zero levels. -->
      <rule id="700000" level="0">
        <decoded_as>json</decoded_as>
        <field name="process_exec.process.exec_id">\.+</field>
        <options>no_full_log</options>
        <group>tetragon_exec,</group>
        <description>exec base (silent)</description>
      </rule>

      <rule id="700001" level="0">
        <decoded_as>json</decoded_as>
        <field name="process_exit.process.exec_id">\.+</field>
        <options>no_full_log</options>
        <group>tetragon_exit,</group>
        <description>exit base (silent)</description>
      </rule>

      <rule id="700002" level="0">
        <decoded_as>json</decoded_as>
        <field name="process_kprobe.process.exec_id">\.+</field>
        <options>no_full_log</options>
        <group>tetragon_kprobe,</group>
        <description>kprobe base (silent)</description>
      </rule>

      <!-- Process exited with non-zero status (possible crash) -->
      <rule id="700003" level="5">
        <if_sid>700001</if_sid>
        <field name="process_exit.status">^[^0]</field>
        <options>no_full_log</options>
        <group>tetragon_exit,</group>
        <description>Crash: $(process_exit.process.binary) status=$(process_exit.status)</description>
      </rule>

      <!-- Shell spawned -->
      <rule id="700004" level="8">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.binary">/usr/bin/sh|/bin/sh|/usr/bin/bash|/bin/bash|/usr/bin/zsh|/bin/zsh|/usr/bin/dash</field>
        <options>no_full_log</options>
        <group>tetragon_exec,container_shell,</group>
        <description>Shell spawn: $(process_exec.process.binary)</description>
      </rule>

      <!-- Outbound download and relay tools -->
      <rule id="700005" level="7">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.binary">/usr/bin/curl|/bin/curl|/usr/bin/wget|/bin/wget|/usr/bin/nc|/bin/nc|/usr/bin/netcat|/bin/netcat|/usr/bin/ncat|/bin/ncat</field>
        <options>no_full_log</options>
        <group>tetragon_exec,data_exfil,</group>
        <description>Download or relay tool: $(process_exec.process.binary)</description>
      </rule>

      <!-- Package manager -->
      <rule id="700006" level="7">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.binary">/usr/bin/apt|/usr/bin/apt-get|/usr/bin/dpkg|/usr/bin/yum|/usr/bin/dnf|/usr/bin/apk|/usr/bin/rpm</field>
        <options>no_full_log</options>
        <group>tetragon_exec,package_install,</group>
        <description>Package mgr: $(process_exec.process.binary)</description>
      </rule>

      <!-- Sensitive file access -->
      <rule id="700007" level="10">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.arguments">/etc/shadow|/etc/passwd|/etc/sudoers|/root/.ssh/|/proc/</field>
        <options>no_full_log</options>
        <group>tetragon_exec,sensitive_file,</group>
        <description>Sensitive file: $(process_exec.process.arguments)</description>
      </rule>

      <!-- Privilege escalation tools -->
      <rule id="700008" level="10">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.binary">/usr/bin/sudo|/bin/su|/usr/bin/su|/usr/sbin/usermod|/usr/sbin/useradd</field>
        <options>no_full_log</options>
        <group>tetragon_exec,priv_escalation,</group>
        <description>Priv-esc: $(process_exec.process.binary)</description>
      </rule>

      <!-- Namespace-aware enrichers: use workload (no replica-set hash suffix) -->
      <rule id="700010" level="9">
        <if_sid>700004</if_sid>
        <field name="process_exec.process.pod.namespace">vulnerable-apps</field>
        <options>no_full_log</options>
        <group>tetragon_exec,container_shell,k8s_aware,</group>
        <description>Shell in $(process_exec.process.pod.workload)</description>
      </rule>

      <rule id="700011" level="8">
        <if_sid>700005</if_sid>
        <field name="process_exec.process.pod.namespace">vulnerable-apps</field>
        <options>no_full_log</options>
        <group>tetragon_exec,data_exfil,k8s_aware,</group>
        <description>Download in $(process_exec.process.pod.workload)</description>
      </rule>

      <!-- Kernel-level network connections (from TracingPolicies) -->
      <rule id="700020" level="6">
        <if_sid>700002</if_sid>
        <field name="process_kprobe.function_name">tcp_connect|ip4_datagram_connect</field>
        <options>no_full_log</options>
        <group>tetragon_kprobe,network,</group>
        <description>TCP connect via $(process_kprobe.process.binary)</description>
      </rule>

      <rule id="700021" level="9">
        <if_sid>700020</if_sid>
        <field name="process_kprobe.process.pod.namespace">vulnerable-apps</field>
        <field name="process_kprobe.process.pod.workload" type="pcre2">(?i)(dvwa|vulnerable-webapp)</field>
        <options>no_full_log</options>
        <group>tetragon_kprobe,network,dvwa,k8s_aware,</group>
        <description>DVWA TCP connect via $(process_kprobe.process.binary)</description>
      </rule>

      <rule id="700022" level="10">
        <if_sid>700002</if_sid>
        <field name="process_kprobe.function_name">security_file_open</field>
        <field name="process_kprobe.policy_name">sensitive-file-open</field>
        <field name="process_kprobe.process.pod.namespace">vulnerable-apps</field>
        <options>no_full_log</options>
        <group>tetragon_kprobe,sensitive_file,k8s_aware,</group>
        <description>Sensitive file open by $(process_kprobe.process.binary)</description>
      </rule>

      <rule id="700030" level="11">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.pod.namespace">vulnerable-apps</field>
        <field name="process_exec.process.parent.binary" type="pcre2">(?i)(apache2|httpd|nginx|php|php-fpm)</field>
        <field name="process_exec.process.binary" type="pcre2">(?i)(/bin/(sh|bash|dash)|/usr/bin/(sh|bash|dash|id|whoami|uname|cat))</field>
        <options>no_full_log</options>
        <group>tetragon_exec,webshell,command_execution,k8s_aware,</group>
        <description>Webshell-like command from $(process_exec.process.parent.binary): $(process_exec.process.binary)</description>
      </rule>

      <!-- Optional HTTP access-log signal. Fires only when JSON logs expose srcip and URL fields. -->
      <rule id="700040" level="3">
        <decoded_as>json</decoded_as>
        <field name="srcip">\.+</field>
        <field name="url" type="pcre2">(?i)(/login\.php|/login|/wp-login\.php|/user/login|/signin)</field>
        <options>no_full_log</options>
        <group>http,authentication,bruteforce_probe,</group>
        <description>HTTP login path request from $(srcip)</description>
      </rule>

      <rule id="700041" level="10" frequency="8" timeframe="60">
        <if_matched_sid>700040</if_matched_sid>
        <same_srcip />
        <options>no_full_log</options>
        <group>http,authentication,bruteforce,</group>
        <description>Repeated HTTP login path requests from $(srcip)</description>
      </rule>

      <!-- Forensic audit trail for vulnerable-apps. Level 3 = recorded but
           low severity. Filter rule.id:700099 for full command timeline. -->
      <rule id="700099" level="3">
        <if_sid>700000</if_sid>
        <field name="process_exec.process.pod.namespace">vulnerable-apps</field>
        <options>no_full_log</options>
        <group>tetragon_exec,command_audit,</group>
        <description>$(process_exec.process.binary) [$(process_exec.process.pod.workload)]</description>
      </rule>

    </group>
