apiVersion: v1
kind: ServiceAccount
metadata:
  name: wazuh-agent-sa
  namespace: wazuh
---
# cluster-admin used for lab simplicity (Active Response pod-delete).
# Production: scope to "delete pods" on target namespaces only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wazuh-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: wazuh-agent-sa
    namespace: wazuh
